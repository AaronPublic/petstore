services:
  # Backend Web Service
  - type: web
    name: petstore-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/petstore-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${PETSTORE_DB_HOST}:${PETSTORE_DB_PORT}/${PETSTORE_DB_NAME}
      - key: PETSTORE_DB_HOST
        fromDatabase:
          name: petstore-db
          property: host
      - key: PETSTORE_DB_PORT
        fromDatabase:
          name: petstore-db
          property: port
      - key: PETSTORE_DB_NAME
        fromDatabase:
          name: petstore-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: petstore-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: petstore-db
          property: password

  # Frontend Static Site
  - type: static
    name: petstore-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: petstore-backend
          property: url
        suffix: /api

databases:
  - name: petstore-db
    databaseName: petstore
    user: petstore_user
    plan: free
